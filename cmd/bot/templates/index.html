<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files.md</title>
    <style>
        html {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            font-size: 62.5%
        }

        body {
            margin: 0;
            background-color: #FFFEF0;
            color: #100F0F;
            font-size: calc(1.4rem + 0.25vw);
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'IBM Plex Sans', 'Segoe UI', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        :root {
            --font-normal: calc(1.5rem + 0.25vw);
            --wrap-wide: 1000px;
            --wrap-normal: 37em;
            --line-height: 1.5;
        }

        @media (max-width: 860px) {
            :root {
                --wrap-normal: 88vw;
                --wrap-wide: 100vw;
            }
        }


        heading, content {
            display: block;
            margin-left: auto;
            margin-right: auto;
            max-width: var(--wrap-wide);
            width: var(--wrap-normal);
        }

        h1 {
            font-weight: 500;
            font-size: calc(1.35em + 0.55vw);
            letter-spacing: -0.02em;
            line-height: 1.25;
            margin-top: 1.5em;
            margin-bottom: 0.25em
        }

        p {
            font-size: var(--font-normal);
            max-width: var(--wrap-normal);
            line-height: var(--line-height);
        }

        ul {
            padding: 0.5rem 0 1rem 1em;
            margin: 0 0 0 0.5em
        }

        ul>li {
            padding: 0.15rem 0
        }

        ul>li::marker {
            color: #B7B5AC;
        }

        ul>li::marker {
            font-size: 85%
        }

        .muted {
            color: #6F6E69;
        }
    </style>
</head>
<body>
<main>
    <article>
        <heading>
            <h1>Let's be lazy</h1>
        </heading>
        <content>
            <p>No <em>productivity</em>, no <em>planning</em>. Relax.</p>
            <p>The only thing that matters is your calmness.</p>
            <p>Your mental energy drains when you keep <em>stuff</em> in your head.</p>
            <p>
                <span class="muted">What stuff?</span>
                <ul>
                    <li>Thoughts and ideas</li>
                    <li>Tasks you need to do</li>
                    <li>Items to buy</li>
                    <li>Links to read</li>
                    <li>Emotions</li>
                </ul>
            </p>
        </content>
    </article>
</main>
</body>
</html>
